<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Games & Life — hufaei 的小游戏合集">
<title>Games &amp; Life · 游戏中心</title>
<meta name="theme-color" content="#0a0a0f">
<meta property="og:type" content="website">
<meta property="og:title" content="Games &amp; Life · 游戏中心">
<meta property="og:description" content="小游戏合集，免费网页游戏，手机电脑即点即玩。">
<meta property="og:url" content="https://hufaei.github.io/games/">
<meta property="og:image" content="https://hufaei.github.io/games/og.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Games &amp; Life · 游戏中心">
<meta name="twitter:description" content="小游戏合集，免费网页游戏，手机电脑即点即玩。">
<meta name="twitter:image" content="https://hufaei.github.io/games/og.jpg">
<style>
  :root{
    --bg:#0a0a0f; --panel:#12121c; --line:#23233a;
    --txt:#e8e8f2; --dim:#8a8aa8; --neon:#7ee0ff;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background:var(--bg); color:var(--txt); min-height:100vh;
    font-family:"Courier New", ui-monospace, monospace;
    background-image:
      linear-gradient(rgba(126,224,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(126,224,255,.04) 1px, transparent 1px);
    background-size:56px 56px;
    display:flex; flex-direction:column; align-items:center;
  }
  header{ text-align:center; padding:64px 20px 28px; }
  h1{
    font-size:clamp(28px,6vw,46px); letter-spacing:.18em;
    text-shadow:0 0 18px rgba(126,224,255,.55);
  }
  h1 span{ color:var(--neon); }
  .sub{ color:var(--dim); margin-top:10px; letter-spacing:.3em; font-size:13px; }
  main{ width:min(960px,92vw); padding-bottom:40px; }
  .grid{
    display:grid; gap:18px; margin-top:26px;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
  }
  .card{
    position:relative; display:block; text-decoration:none; color:var(--txt);
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:24px 22px; transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    overflow:hidden;
  }
  .card:hover{
    transform:translateY(-4px);
    border-color:var(--accent, var(--neon));
    box-shadow:0 0 24px color-mix(in srgb, var(--accent, var(--neon)) 28%, transparent);
  }
  .icon{
    font-size:38px; line-height:1; color:var(--accent, var(--neon));
    text-shadow:0 0 14px color-mix(in srgb, var(--accent, var(--neon)) 70%, transparent);
  }
  .card h2{ margin-top:14px; font-size:19px; letter-spacing:.08em; }
  .card p{ margin-top:8px; color:var(--dim); font-size:13px; line-height:1.6; min-height:42px; }
  .tags{ margin-top:14px; display:flex; gap:8px; flex-wrap:wrap; }
  .tag{
    font-size:11px; color:var(--accent, var(--neon));
    border:1px solid color-mix(in srgb, var(--accent, var(--neon)) 45%, transparent);
    border-radius:999px; padding:2px 10px;
  }
  .card.soon{ opacity:.55; cursor:default; }
  .card.soon:hover{ transform:none; border-color:var(--line); box-shadow:none; }
  footer{
    margin-top:auto; padding:30px 20px 44px; text-align:center;
    color:var(--dim); font-size:13px; line-height:2;
  }
  footer a{ color:var(--neon); text-decoration:none; }
  footer a:hover{ text-shadow:0 0 10px rgba(126,224,255,.7); }
</style>
</head>
<body>
  <header>
    <h1>GAMES <span>&amp;</span> LIFE</h1>
    <div class="sub">小 游 戏 合 集 · 玩 就 完 了</div>
  </header>
  <main>
    <div class="grid" id="grid"></div>
  </main>
  <footer>
    <div>📺 看番去 → <a href="https://hufaei.github.io/">Mirune 追番档案</a></div>
    <div>GitHub → <a href="https://github.com/hufaei">@hufaei</a></div>
  </footer>

<script>
  // 新增游戏只需在此追加一项
  const GAMES = [
    {
      title: '刃 · BLADE',
      desc: '几何美学 Roguelike 砍杀。三角色三流派，冲刺斩连段、波次 Boss、每日变异与永久成长。',
      icon: '△',
      accent: '#7ee0ff',
      tags: ['动作', '肉鸽', 'Roguelike'],
      url: 'https://hufaei.github.io/blade-game-project/'
    }
  ];

  const grid = document.getElementById('grid');
  for (const g of GAMES){
    const a = document.createElement('a');
    a.className = 'card';
    a.href = g.url;
    a.style.setProperty('--accent', g.accent);
    a.innerHTML = `
      <div class="icon">${g.icon}</div>
      <h2>${g.title}</h2>
      <p>${g.desc}</p>
      <div class="tags">${g.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
    grid.appendChild(a);
  }
  const soon = document.createElement('div');
  soon.className = 'card soon';
  soon.innerHTML = `
    <div class="icon">▢</div>
    <h2>???</h2>
    <p>下一款游戏制作中……</p>
    <div class="tags"><span class="tag">敬请期待</span></div>`;
  grid.appendChild(soon);
</script>
</body>
</html>
